<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1分更新！GPSかくれんぼMap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #222; color: white; }
        #map { height: 80vh; width: 100%; display: none; } /* 最初は隠す */
        #info { height: 20vh; display: none; flex-direction: column; align-items: center; justify-content: center; background: #333; }
        
        /* スタート画面のスタイル */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        #start-button {
            padding: 20px 40px; font-size: 1.5rem; cursor: pointer;
            background: #4CAF50; color: white; border: none; border-radius: 10px;
        }

        .timer-bar { width: 80%; height: 10px; background: #555; margin-top: 10px; }
        #progress { width: 100%; height: 100%; background: #4CAF50; transition: width 1s linear; }
    </style>
</head>
<body>

<!-- スタート画面 -->
<div id="start-screen">
    <h1>GPSかくれんぼ</h1>
    <p>位置情報を利用してゲームを開始します</p>
    <button id="start-button">位置情報を許可して開始</button>
</div>

<div id="map"></div>
<div id="info">
    <div id="status">準備完了</div>
    <div id="next-update">次の位置更新まで: 60秒</div>
    <div class="timer-bar"><div id="progress"></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const isSeeker = true; 
    let secondsLeft = 60;
    let map, myMarker, opponentMarker;
    let timerStarted = false;

    // --- スタートボタンが押された時の処理 ---
    document.getElementById('start-button').addEventListener('click', () => {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('map').style.display = 'block';
        document.getElementById('info').style.display = 'flex';
        
        initMap(); // 地図の初期化
        startTracking(); // 追跡開始
    });

    function initMap() {
        // 画像の場所（富士市付近）を初期値に設定
        map = L.map('map').setView([35.161, 138.676], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const seekerIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
            iconSize: [25, 41], iconAnchor: [12, 41]
        });

        myMarker = L.marker([0, 0], { icon: seekerIcon }).addTo(map).bindPopup("自分");
    }

    function updatePositions() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                myMarker.setLatLng([lat, lng]);
                map.panTo([lat, lng]); // 自分の位置を画面中央に
                document.getElementById('status').innerText = "位置情報を更新しました";
                console.log("Updated:", lat, lng);
            }, (err) => {
                document.getElementById('status').innerText = "エラー: " + err.message;
            }, { enableHighAccuracy: true });
        }
    }

    function startTracking() {
        updatePositions(); // 初回実行
        
        if (!timerStarted) {
            setInterval(() => {
                secondsLeft--;
                document.getElementById('next-update').innerText = `次の位置更新まで: ${secondsLeft}秒`;
                document.getElementById('progress').style.width = (secondsLeft / 60 * 100) + "%";

                if (secondsLeft <= 0) {
                    updatePositions();
                    secondsLeft = 60;
                }
            }, 1000);
            timerStarted = true;
        }
    }
</script>
</body>
</html>
