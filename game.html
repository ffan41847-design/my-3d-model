<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Highway Simulator - Toll Gate Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #gui { position: absolute; top: 30px; left: 30px; color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); pointer-events: none; z-index: 10; }
        .stat { font-size: 32px; font-weight: 900; font-style: italic; margin-bottom: 5px; border-left: 5px solid #ffcc00; padding-left: 15px; }
        #instructions { position: absolute; bottom: 30px; width: 100%; text-align: center; color: white; font-size: 18px; text-shadow: 1px 1px 3px black; background: rgba(0,0,0,0.4); padding: 10px 0; z-index: 10; }
        #toll-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffcc00; font-size: 48px; font-weight: bold; text-shadow: 3px 3px 10px black; display: none; z-index: 20; }
    </style>
</head>

        <div class="stat">VIEW: <span id="viewMode">3rd Person</span></div>
    </div>

        function loadCustomModel(callback) {
            const loader = new OBJLoader();
            // Source 2の独自バイナリ形式を文字列として読み込みパース
            const model = loader.parse(rawObjData);
            callback(model);
        }

        function createSignTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#FFD700'; ctx.fillRect(0, 0, 512, 256);
            ctx.strokeStyle = 'black'; ctx.lineWidth = 15;
            ctx.strokeRect(10, 10, 492, 236);
            ctx.fillStyle = 'black';
            ctx.font = 'bold 60px "Hiragino Sans", "Meiryo", sans-serif';
            ctx.textAlign = 'center'; ctx.fillText('料金所注意', 256, 100);
            ctx.font = 'bold 45px "Hiragino Sans", "Meiryo", sans-serif';
            ctx.fillText('速度落とせ', 256, 180);
            return new THREE.CanvasTexture(canvas);
        }
        const signTex = createSignTexture();

        // --- Toll Gate Class ---
        class TollGate {
            constructor(z) {
                this.group = new THREE.Group();
                this.isOpen = false;
                this.z = z;
                
                // 指示された3Dモデルの追加
                loadCustomModel((model) => {
                    model.scale.set(1.5, 1.5, 1.5);
                    model.rotation.y = Math.PI;
                    model.traverse(n => {
                        if(n.isMesh) {
                            n.material = new THREE.MeshStandardMaterial({color: 0x777777, metalness: 0.5});
                            n.castShadow = true; n.receiveShadow = true;
                        }
                    });
                    this.group.add(model);
                });

                // 電光掲示板
                const signBoard = new THREE.Mesh(new THREE.PlaneGeometry(12, 6), new THREE.MeshBasicMaterial({map: signTex}));
                signBoard.position.set(0, 10, 2.1);
                this.group.add(signBoard);

                // バー (各車線)
                this.bars = [];
                LANES_X.forEach(x => {
                    const barGroup = new THREE.Group();
                    const bar = new THREE.Mesh(new THREE.BoxGeometry(LANE_WIDTH, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0xffaa00, emissive: 0xff0000, emissiveIntensity: 0.5}));
                    bar.position.x = LANE_WIDTH/2;
                    barGroup.add(bar);
                    barGroup.position.set(x - LANE_WIDTH/2, 1.5, 2);
                    this.group.add(barGroup);
                    this.bars.push(barGroup);
                });

                this.group.position.z = z;
                scene.add(this.group);
            }

            update(playerZ, speed) {
                const distToToll = Math.abs(this.group.position.z - playerZ);
                if (distToToll < 20 && speed < 0.25) this.isOpen = true;
                if (this.isOpen) {
                    this.bars.forEach(b => {
                        b.rotation.z = THREE.MathUtils.lerp(b.rotation.z, Math.PI/2.2, 0.1);
                    });
                }
            }
        }

        function createSkinColorHuman() {
            const group = new THREE.Group();
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
            const shirtMat = new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(Math.random(), 0.7, 0.5) });
            const pantsMat = new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(Math.random(), 0.5, 0.3) });
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.6, 4, 8), shirtMat);
            body.position.y = 0.6; group.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), skinMat);
            head.position.y = 1.2; group.add(head);
            const limbGeo = new THREE.CapsuleGeometry(0.08, 0.5, 2, 4);
            const lArm = new THREE.Mesh(limbGeo, skinMat); lArm.position.set(0.35, 0.8, 0); group.add(lArm);
            const rArm = new THREE.Mesh(limbGeo, skinMat); rArm.position.set(-0.35, 0.8, 0); group.add(rArm);
            const lLeg = new THREE.Mesh(limbGeo, pantsMat); lLeg.position.set(0.15, 0.25, 0); group.add(lLeg);
            const rLeg = new THREE.Mesh(limbGeo, pantsMat); rLeg.position.set(-0.15, 0.25, 0); group.add(rLeg);
            group.traverse(n => { if(n.isMesh) n.castShadow = true; });
            return { group: group, body: body, head: head, limbs: [lArm, rArm, lLeg, rLeg] };
        }

        class Car {
            constructor(color, isPlayer = false) {
                this.group = new THREE.Group();
                this.isPlayer = isPlayer; this.wheels = []; this.isCrashed = false; this.crashTime = 0;
                this.spawnDelay = 0; this.humansSpawned = false; this.humanEjected = false;
                this.velX = 0; this.velZ = 0; this.velRot = 0; this.roll = 0;
                this.willAvoid = Math.random() > 0.25;

                this.bodyGeo = new THREE.BoxGeometry(2.2, 0.9, 5.0, 12, 8, 12);
                this.initialVertices = Array.from(this.bodyGeo.attributes.position.array);
                this.bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.12, metalness: 0.45 });
                this.bodyMesh = new THREE.Mesh(this.bodyGeo, this.bodyMat);
                this.bodyMesh.position.y = 0.9; this.bodyMesh.castShadow = true;
                this.group.add(this.bodyMesh);

                this.winGeo = new THREE.BoxGeometry(1.95, 0.85, 2.9, 8, 4, 8);
                this.winInitialVertices = Array.from(this.winGeo.attributes.position.array);
                this.windows = new THREE.Mesh(this.winGeo, new THREE.MeshStandardMaterial({ color: 0x080808, metalness: 1 }));
                this.windows.position.set(0, 1.6, -0.2); this.group.add(this.windows);

                const createPart = (geo, mat, pos, type) => {
                    const m = new THREE.Mesh(geo, mat); m.position.copy(pos);
                    this.group.add(m); return { mesh: m, type: type, initialPos: pos.clone(), dropped: false };
                };
                const lampGeo = new THREE.BoxGeometry(0.65, 0.28, 0.12);
                const sGeo = new THREE.BoxGeometry(0.38, 0.22, 0.12);
                const headGeo = new THREE.BoxGeometry(0.55, 0.25, 0.12);

                this.tailL = createPart(lampGeo, new THREE.MeshStandardMaterial({ color: 0x440000, emissive: 0xff0000, emissiveIntensity: 2.5 }), new THREE.Vector3(0.85, 0.85, -2.51), 'tail');
                this.tailR = createPart(lampGeo, new THREE.MeshStandardMaterial({ color: 0x440000, emissive: 0xff0000, emissiveIntensity: 2.5 }), new THREE.Vector3(-0.85, 0.85, -2.51), 'tail');
                this.sigL = createPart(sGeo, new THREE.MeshStandardMaterial({ color: 0x331100, emissive: 0xffaa00, emissiveIntensity: 0 }), new THREE.Vector3(0.65, 0.85, -2.52), 'sig');
                this.sigR = createPart(sGeo, new THREE.MeshStandardMaterial({ color: 0x331100, emissive: 0xffaa00, emissiveIntensity: 0 }), new THREE.Vector3(-0.65, 0.85, -2.52), 'sig');
                this.headL = createPart(headGeo, new THREE.MeshStandardMaterial({ color: 0xeeeeee, emissive: 0xffffff, emissiveIntensity: 3.0 }), new THREE.Vector3(0.65, 0.85, 2.51), 'head');
                this.headR = createPart(headGeo, new THREE.MeshStandardMaterial({ color: 0xeeeeee, emissive: 0xffffff, emissiveIntensity: 3.0 }), new THREE.Vector3(-0.85, 0.85, 2.51), 'head');
                this.fSigL = createPart(sGeo, new THREE.MeshStandardMaterial({ color: 0x331100, emissive: 0xffaa00, emissiveIntensity: 0 }), new THREE.Vector3(1.0, 0.85, 2.51), 'sig');
                this.fSigR = createPart(sGeo, new THREE.MeshStandardMaterial({ color: 0x331100, emissive: 0xffaa00, emissiveIntensity: 0 }), new THREE.Vector3(-1.0, 0.85, 2.51), 'sig');
                this.lights = [this.tailL, this.tailR, this.sigL, this.sigR, this.headL, this.headR, this.fSigL, this.fSigR];

                const wGeo = new THREE.CylinderGeometry(0.48, 0.48, 0.55, 32);
                const wMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a });
                [{x:1.1, z:1.6}, {x:-1.1, z:1.6}, {x:1.1, z:-1.6}, {x:-1.1, z:-1.6}].forEach(p => {
                    const w = new THREE.Mesh(wGeo, wMat); w.rotation.z = Math.PI/2; w.position.set(p.x, 0.48, p.z);
                    w.castShadow = true; this.wheels.push(w); this.group.add(w);
                });
                this.group.rotation.y = Math.PI; scene.add(this.group);
            }

            applyPhysicsImpact(relVel, impactX, impactY, impactZ, normalX, normalY, normalZ, spinFactor = 1.0) {
                const impactPower = Math.min(Math.abs(relVel) * 5.0, 15);
                if (impactPower < 0.2) return;
                this.velX += impactX * impactPower * 0.08; this.velZ += impactZ * impactPower * 0.08;
                this.velRot += (Math.random() - 0.5) * impactPower * 0.12 * spinFactor;
                if(!this.isCrashed) { this.isCrashed = true; this.crashTime = Date.now(); this.spawnDelay = 10000 + Math.random()*10000; }
                const deform = (geo, initVerts) => {
                    const pos = geo.attributes.position;
                    for (let i = 0; i < pos.count; i++) {
                        const vx = pos.getX(i); const vy = pos.getY(i); const vz = pos.getZ(i);
                        const dist = Math.sqrt(Math.pow(vx-impactX,2)+Math.pow(vy-impactY,2)+Math.pow(vz-impactZ,2));
                        if (dist < 2.5) {
                            const d = (2.5 - dist) * impactPower * 0.15;
                            pos.setXYZ(i, vx - normalX*d + (Math.random()-0.5)*d*0.3, vy - normalY*d + (Math.random()-0.5)*d*0.3, vz - normalZ*d + (Math.random()-0.5)*d*0.3);
                        }
                    }
                    pos.needsUpdate = true;
                };
                deform(this.bodyGeo, this.initialVertices); deform(this.winGeo, this.winInitialVertices);
                this.lights.forEach(part => {
                    if (!part.dropped && part.mesh.position.distanceTo(new THREE.Vector3(impactX, impactY, impactZ)) < 1.8 && impactPower > 4) {
                        part.dropped = true; const worldPos = new THREE.Vector3(); part.mesh.getWorldPosition(worldPos);
                        scene.attach(part.mesh); fallenParts.push({ mesh: part.mesh, vel: new THREE.Vector3((Math.random()-0.5)*0.5, 0.2, (Math.random()-0.5)*0.5 + (this.isPlayer ? -window.currentSpeed : 0)), rot: new THREE.Vector3(Math.random()*0.2, Math.random()*0.2, Math.random()*0.2) });
                    }
                });
                if (impactPower > 7.5 && !this.humanEjected) {
                    const h = createSkinColorHuman(); const worldPos = new THREE.Vector3(); this.group.getWorldPosition(worldPos);
                    h.group.position.copy(worldPos).add(new THREE.Vector3(0, 1.2, 0)); scene.add(h.group);
                    humans.push({ mesh: h.group, limbs: h.limbs, vel: new THREE.Vector3(impactX*0.4, 0.4, impactZ*0.4 - (this.isPlayer ? window.currentSpeed : 0)), rot: new THREE.Vector3(Math.random()*3, Math.random()*3, Math.random()*3), isStanding: false });
                    this.humanEjected = true;
                }
            }

            checkRailCollision() {
                const limit = RAIL_X - 1.1;
                if (Math.abs(this.group.position.x) > limit) {
                    const side = Math.sign(this.group.position.x); this.group.position.x = side * limit;
                    this.applyPhysicsImpact(this.isPlayer ? window.currentSpeed : 0.5, side * 1.1, 0.9, 0, side, 0, 0, 0.2);
                    this.velX = -side * 0.05; if(this.isPlayer) window.currentSpeed *= 0.96;
                }
            }

            reset() {
                this.isCrashed = false; this.humanEjected = false; this.humansSpawned = false; this.velX = 0; this.velZ = 0; this.velRot = 0;
                this.group.rotation.set(0, Math.PI, 0);
                const resetGeo = (geo, init) => {
                    const p = geo.attributes.position;
                    for (let i = 0; i < p.count; i++) { p.setXYZ(i, init[i*3], init[i*3+1], init[i*3+2]); }
                    p.needsUpdate = true;
                };
                resetGeo(this.bodyGeo, this.initialVertices); resetGeo(this.winGeo, this.winInitialVertices);
                this.lights.forEach(p => { if (p.dropped) { this.group.add(p.mesh); p.dropped = false; } p.mesh.position.copy(p.initialPos); });
            }

            updateLights(braking, steer, time) {
                const blink = Math.sin(time * 25) > 0;
                const rInt = braking ? 90 : 4.5;
                [this.tailL, this.tailR].forEach(p => { if(!p.dropped) p.mesh.material.emissiveIntensity = rInt; });
                const sLights = [this.sigL, this.sigR, this.fSigL, this.fSigR];
                if (this.isCrashed) {
                    sLights.forEach(p => { if(!p.dropped) p.mesh.material.emissiveIntensity = blink ? 150 : 0; });
                } else {
                    if(!this.sigL.dropped) this.sigL.mesh.material.emissiveIntensity = (steer < 0 && blink) ? 150 : 0;
                    if(!this.sigR.dropped) this.sigR.mesh.material.emissiveIntensity = (steer > 0 && blink) ? 150 : 0;
                }
            }
        }

        function createSegment(z) {
            const group = new THREE.Group();
            const road = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_WIDTH * 1.8, SEGMENT_LENGTH + 0.5), new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 }));
            road.rotation.x = -Math.PI / 2; road.receiveShadow = true; group.add(road);
            const railMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9 });
            const lr = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.3, SEGMENT_LENGTH + 0.5), railMat);
            lr.position.set(-RAIL_X, 0.65, 0); group.add(lr);
            const rr = lr.clone(); rr.position.x = RAIL_X; group.add(rr);
            group.position.z = z; return group;
        }

        const segments = [];
        for(let i=0; i<TOTAL_SEGMENTS; i++) {
            const s = createSegment(-i * SEGMENT_LENGTH); scene.add(s); segments.push(s);
        }

        const player = new Car(0xffffff, true);
        const npcs = [];
        for(let i=0; i<14; i++) {
            const npc = new Car(new THREE.Color().setHSL(Math.random(), 0.65, 0.45));
            npc.group.position.set(LANES_X[i % 4], 0, -80 - (i * 30));
            npcs.push({ obj: npc, speed: 0.8 + Math.random()*0.6, targetCruiseSpeed: 0.8 + Math.random()*0.6, lane: i % 4, laneTimer: 0 });
        }

        window.currentSpeed = 0;
        let playerX = 0, dist = 0, isFirstPerson = false, lastTollDist = 0;
        const keys = {};
        window.onkeydown = e => { keys[e.code] = true; if(e.code === 'KeyC') { isFirstPerson = !isFirstPerson; document.getElementById('viewMode').innerText = isFirstPerson ? "1st Person" : "3rd Person"; } };
        window.onkeyup = e => keys[e.code] = false;

        function animate(time) {
            requestAnimationFrame(animate);
            const delta = time * 0.001;

            if (!player.isCrashed) {
                if (keys['KeyW']) window.currentSpeed += 0.01;
                else if (keys['KeyS']) window.currentSpeed -= 0.035;
                else window.currentSpeed *= 0.985;
                window.currentSpeed = Math.max(0, Math.min(window.currentSpeed, MAX_SPEED_CAP));
            } else { window.currentSpeed *= 0.96; }

            let steerDir = 0;
            if (window.currentSpeed > 0.05 && !player.isCrashed) {
                if (keys['KeyA']) { player.velX -= 0.006; steerDir = -1; player.roll = THREE.MathUtils.lerp(player.roll, 0.08, 0.12); }
                else if (keys['KeyD']) { player.velX += 0.006; steerDir = 1; player.roll = THREE.MathUtils.lerp(player.roll, -0.08, 0.12); }
                else { player.velX *= 0.88; player.roll = THREE.MathUtils.lerp(player.roll, 0, 0.1); }
            }
            playerX += player.velX; player.group.position.x = playerX;
            player.group.rotation.y += player.velRot; player.velRot *= 0.94;
            player.bodyMesh.rotation.z = player.roll;
            player.checkRailCollision();
            player.updateLights(keys['KeyS'], steerDir, delta);

            if (dist - lastTollDist > TOLL_INTERVAL) {
                tollGates.push(new TollGate(-500)); lastTollDist = dist;
            }

            const tollUI = document.getElementById('toll-msg'); tollUI.style.display = "none";
            for (let i = tollGates.length - 1; i >= 0; i--) {
                const tg = tollGates[i]; tg.group.position.z += window.currentSpeed;
                tg.update(player.group.position.z, window.currentSpeed);
                const dZ = tg.group.position.z - player.group.position.z;
                if (dZ < 50 && dZ > 0) tollUI.style.display = "block";
                if (!tg.isOpen && Math.abs(dZ) < 2.5) { player.applyPhysicsImpact(window.currentSpeed, 0, 0.9, -2.5, 0, 0, -1); window.currentSpeed = 0; }
                if (tg.group.position.z > 100) { scene.remove(tg.group); tollGates.splice(i, 1); }
            }

            fallenParts.forEach((p, i) => {
                p.vel.y -= 0.01; p.mesh.position.add(p.vel); p.mesh.rotation.x += p.rot.x; p.mesh.position.z += window.currentSpeed;
                if (p.mesh.position.y < 0.1) { p.mesh.position.y = 0.1; p.vel.set(0,0,0); }
            });

            humans.forEach((h, i) => {
                h.vel.y -= 0.02; h.mesh.position.add(h.vel); h.mesh.rotation.x += h.rot.x; h.mesh.position.z += window.currentSpeed;
                if (h.mesh.position.y < 0.1) { h.mesh.position.y = 0.1; h.vel.set(0,0,0); }
            });

            segments.forEach(s => {
                s.position.z += window.currentSpeed;
                if(s.position.z > SEGMENT_LENGTH) s.position.z -= WORLD_LENGTH;
            });

            npcs.forEach((n, i) => {
                if (!n.obj.isCrashed) {
                    n.obj.group.position.z += window.currentSpeed - n.speed;
                    tollGates.forEach(tg => {
                        const dzT = tg.group.position.z - n.obj.group.position.z;
                        if (dzT > 0 && dzT < 60 && !tg.isOpen) n.speed *= 0.92;
                    });
                    const diff = LANES_X[n.lane] - n.obj.group.position.x;
                    n.obj.group.position.x += Math.sign(diff) * 0.05;
                } else {
                    n.obj.group.position.z += window.currentSpeed;
                }
                const dZ = n.obj.group.position.z - player.group.position.z;
                const dX = n.obj.group.position.x - playerX;
                if(Math.abs(dZ) < 4.8 && Math.abs(dX) < 2.2) {
                    n.obj.applyPhysicsImpact(window.currentSpeed - n.speed, dX, 0.9, Math.sign(dZ), Math.sign(dX), 0, Math.sign(dZ));
                    player.applyPhysicsImpact(n.speed - window.currentSpeed, -dX, 0.9, -Math.sign(dZ), -Math.sign(dX), 0, -Math.sign(dZ));
                }
                if(n.obj.group.position.z > 120 || n.obj.group.position.z < -600) { n.obj.reset(); n.obj.group.position.z = -550; n.speed = 0.8 + Math.random()*0.6; }
            });

            dist += window.currentSpeed * 0.28;
            document.getElementById('speed').innerText = Math.floor(window.currentSpeed * 120);
            document.getElementById('dist').innerText = Math.floor(dist);

            if(isFirstPerson) { camera.position.set(playerX, 1.72, -0.35); camera.lookAt(playerX, 1.5, -60); }
            else { camera.position.set(playerX * 0.45, 5.2, 14.5); camera.lookAt(playerX, 1.2, -22); }
            renderer.render(scene, camera);
        }
        animate(0);
    </script>
</body>
</html>
